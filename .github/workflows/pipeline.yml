# .github/workflows/ci.yml
name: CI Pipeline
 
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # 2. Configurar Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
 
      # 3. Instalar dependencias
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 bandit pytest-cov
 
      # 4. Linter — PEP 8 y errores de sintaxis
      - name: Lint with flake8
        run: |
          flake8 calculadora/ tests/ main.py --max-line-length=100
 
      # 5. Tests unitarios
      - name: Run tests
        run: pytest tests/ -v
 
      # 6. Cobertura de tests
      - name: Test coverage
        run: pytest tests/ --cov=calculadora --cov-report=term-missing --cov-fail-under=80
 
      # 7. Análisis de seguridad
      - name: Security scan with bandit
        run: bandit -r calculadora/ -ll